<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Origin AI · Proof</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700&family=Inter+Tight:wght@400;500;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="styles/hero.css?v=4" />
<link rel="stylesheet" href="styles/sections.css?v=1" />
<link rel="stylesheet" href="styles/proof.css?v=1" />
</head>
<body>

<section class="stage" data-screen-label="Proof">
  <div class="stage-grain" aria-hidden="true"></div>
  <div class="stage-inner">

    <header class="s-header">
      <div>
        <span class="eyebrow">Proof</span>
        <h2 class="s-h2 display">
          <span>Leadership teams trust us</span>
          <span class="muted"> with their AI direction.</span>
        </h2>
      </div>
      <p class="s-lede">
        From operations floors to executive teams — a sample of the work and the people behind it.
      </p>
    </header>

    <!-- Client wordmark row -->
    <div class="proof-marks" aria-label="Selected clients">
      <span class="proof-marks-label"><span class="bar"></span>Selected clients</span>
      <div class="proof-marks-row">
        <span class="wordmark">Tripwire Media Group</span>
        <span class="wordmark">Direct Focus</span>
        <span class="wordmark">Thor Plumbing<span class="amp"> &amp; </span>Heating</span>
        <span class="wordmark">Equipco Ltd.</span>
      </div>
    </div>

    <!-- Two testimonials -->
    <div class="testimonials">

      <figure class="testimonial">
        <blockquote class="t-quote">
          Origin shifted the way our team thinks. They taught us how to frame problems in a way that unlocks better solutions. <span class="accent">That shift alone has changed how we operate.</span>
        </blockquote>
        <figcaption class="t-attr">
          <span class="t-avatar" aria-hidden="true">DD</span>
          <span class="t-meta">
            <span class="t-name">Doug Darling</span>
            <span class="t-role">CEO, Tripwire Media Group</span>
          </span>
        </figcaption>
      </figure>

      <figure class="testimonial">
        <blockquote class="t-quote">
          After two workshops with Origin, our team felt noticeably more confident using AI. <span class="accent">The mindset shift paid off immediately</span>, with staff identifying and building valuable use cases on their own.
        </blockquote>
        <figcaption class="t-attr">
          <span class="t-avatar" aria-hidden="true">KN</span>
          <span class="t-meta">
            <span class="t-name">Keith Nyman</span>
            <span class="t-role">VP Operations, Direct Focus</span>
          </span>
        </figcaption>
      </figure>

    </div>

  </div>
</section>

</body>
</html>
